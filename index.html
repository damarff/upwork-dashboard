<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Upwork Scraper</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:20px 16px;border-bottom:1px solid #334155;position:sticky;top:0;z-index:100}
.header h1{font-size:1.3rem;color:#f8fafc}
.header h1 span{color:#14b8a6}
.header .sub{font-size:.8rem;color:#94a3b8;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
.card{background:#1e293b;border-radius:12px;padding:14px;text-align:center;border:1px solid #334155}
.card .n{font-size:1.6rem;font-weight:700}
.card .l{font-size:.7rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.g{color:#22c55e}.y{color:#eab308}.s{color:#64748b}.b{color:#3b82f6}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.filters input,.filters select{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:.85rem;flex:1;min-width:120px}
.jobs{display:flex;flex-direction:column;gap:8px}
.job{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.job:hover{border-color:#14b8a6}
.job .top{display:flex;justify-content:space-between;gap:8px}
.job .t{font-weight:600;font-size:.9rem;color:#f1f5f9;flex:1}
.job .scr{font-size:.75rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.scr-a{background:#22c55e22;color:#22c55e}
.scr-w{background:#eab30822;color:#eab308}
.scr-s{background:#64748b22;color:#94a3b8}
.job .meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;font-size:.75rem;color:#94a3b8}
.job .skills{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{background:#334155;color:#94a3b8;padding:2px 8px;border-radius:12px;font-size:.7rem}
.job .desc{font-size:.8rem;color:#64748b;margin-top:8px;line-height:1.4;display:none}
.job.open .desc{display:block}
.job .act{margin-top:8px;display:none;gap:6px}
.job.open .act{display:flex}
.btn{background:#14b8a6;color:#0f172a;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:.85rem;cursor:pointer;text-decoration:none;display:inline-block}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn:hover{background:#0d9488}
.loading{text-align:center;padding:40px;color:#64748b}
.err{text-align:center;padding:20px;color:#ef4444;font-size:.85rem}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class=header><h1>Upwork <span>Scraper</span></h1><div class=sub>Job pipeline dashboard</div></div>
<div class=container id=app>
<div class=stats id=stats>
<div class=card><div class="n b">-</div><div class=l>Total</div></div>
<div class=card><div class="n g">-</div><div class=l>Apply</div></div>
<div class=card><div class="n y">-</div><div class=l>Watch</div></div>
<div class=card><div class="n s">-</div><div class=l>Skip</div></div>
</div>
<div class=filters>
<input id=q placeholder="Cari..." oninput="d()">
<select id=r onchange=load()><option value="">Semua</option><option value=apply>🎯Apply</option><option value=watch>👀Watch</option><option value=skip>⏭️Skip</option></select>
<button class="btn btn-sm" onclick=load()>⟳</button>
</div>
<div id=jobs class=loading>Loading...</div>
<div id=more style=text-align:center;margin:20px;display:none><button class=btn onclick=loadMore()>Load More</button></div>
</div>

<script>
let tg; try{tg=window.Telegram.WebApp;tg.ready();tg.expand()}catch(e){}
if(tg&&tg.colorScheme==='dark')document.body.style.background=tg.themeParams.bg_color||'#0f172a'

const API = 'https://vm-0-14-ubuntu.rufous-larch.ts.net/upwork'
let off=0, jobs=[]

async function loadStats(){
  try{
    const s=await fetch(API+'/api/stats').then(r=>r.json())
    document.querySelectorAll('.card .n')[0].textContent=s.total
    document.querySelectorAll('.card .n')[1].textContent=s.apply||0
    document.querySelectorAll('.card .n')[2].textContent=s.watch||0
    document.querySelectorAll('.card .n')[3].textContent=s.skip||0
  }catch(e){}
}
async function load(a){
  const q=document.getElementById('q').value, r=document.getElementById('r').value
  off=a?off:0; if(!a)document.getElementById('jobs').innerHTML='<div class=loading>Loading...</div>'
  try{
    const d=await fetch(`${API}/api/jobs?q=${encodeURIComponent(q)}&rec=${r}&limit=30&offset=${off}`).then(r=>r.json())
    if(!d.jobs||!d.jobs.length){document.getElementById('jobs').innerHTML='<div class=loading>No jobs</div>';return}
    if(!a){jobs=[];document.getElementById('jobs').innerHTML=''}
    const el=document.getElementById('jobs')
    d.jobs.forEach(j=>{
      jobs.push(j)
      const card=document.createElement('div');card.className='job'
      card.innerHTML=`
        <div class=top><div class=t>${e(j.title)}</div><div class="scr scr-${j.recommendation||'s'}">${j.score||0}</div></div>
        <div class=meta><span>💰 ${e(j.budget_text||'-')}</span><span>📅 ${j.published_at?j.published_at.slice(0,10):'-'}</span></div>
        <div class=skills>${(j.skills||[]).slice(0,5).map(s=>'<span class=tag>'+e(s)+'</span>').join('')}</div>
        <div class=desc>${(j.description||'').slice(0,300)}...</div>
        <div class=act><a href="${e(j.url)}" target=_blank class="btn btn-sm">🔗 Buka</a></div>
      `
      card.onclick=()=>card.classList.toggle('open')
      el.appendChild(card)
    })
    off+=d.jobs.length
    document.getElementById('more').style.display=d.total>off?'block':'none'
  }catch(e){document.getElementById('jobs').innerHTML='<div class=err>Error: '+e.message+'</div>'}
}
function loadMore(){load(true)}
let st;function d(){clearTimeout(st);st=setTimeout(load,400)}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
loadStats();load()
</script>
</body>
</html>
